services:
  slimkay-web:
    build: .
    container_name: slimkay-web
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
