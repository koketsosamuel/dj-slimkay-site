server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    port_in_redirect off;
    absolute_redirect off;

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location = /robots.txt {
        try_files $uri =404;
        access_log off;
    }

    location ~* \.(css|js|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif|mp3|wav|ogg|m4a)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    error_page 404 /404.html;
}
